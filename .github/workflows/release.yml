name: Release

on:
  release:
    types:
      - published

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive build version (strip leading 'v')
        id: vars
        run: |
          TAG="${{ github.ref_name }}"
          echo "build_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ktonchekliev/homelab-keeper:${{ github.ref_name }}
            ktonchekliev/homelab-keeper:latest
          build-args: |
            BUILD_VERSION=${{ steps.vars.outputs.build_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
